[package]
name = "valuable"
version = "0.1.1"
edition = "2021"
license = "MIT"
rust-version = "1.56"

[lib]
path = "src/lib.rs"

[features]
"alloc" = []
"default" = ["std"]
"derive" = ["valuable-derive"]
"std" = ["alloc"]

[dev-dependencies."criterion"]
version = "^0.3"

[dependencies."valuable-derive"]
version = "=0.1.1"
optional = true
